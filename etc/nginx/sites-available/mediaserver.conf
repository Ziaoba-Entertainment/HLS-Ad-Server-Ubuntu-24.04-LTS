server {
    listen 80;
    server_name stream.ziaoba.com;

    # Global Performance Settings
    gzip off;
    client_max_body_size 20G;

    # 1. HLS VOD Delivery (Movies/TV)
    location /hls/ {
        alias /srv/vod/hls/;
        
        types {
            application/vnd.apple.mpegurl m3u8;
            video/MP2T ts;
        }

        # CORS Headers for Cross-Domain Playback
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";

        # Cache Control
        location ~* \.m3u8$ {
            add_header Cache-Control no-cache;
        }
        location ~* \.ts$ {
            # TS segments are immutable
            add_header Cache-Control "max-age=31536000";
        }
    }

    # 2. Advertisement HLS Delivery
    location /ads/ {
        alias /srv/vod/ads/;
        
        types {
            application/vnd.apple.mpegurl m3u8;
            video/MP2T ts;
        }

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";

        location ~* \.m3u8$ {
            add_header Cache-Control no-cache;
        }
        location ~* \.ts$ {
            add_header Cache-Control "max-age=31536000";
        }
    }

    # 3. Ad Stitching Middleware
    location /playlist/ {
        proxy_pass http://127.0.0.1:8083/playlist/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Cloudflare specific headers
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range' always;

        # Cache Control for Manifests
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;

        types {
            application/vnd.apple.mpegurl m3u8;
        }
    }

    # 4. HLS Content Segments (Compatibility)
    location /segments/hls/ {
        alias /srv/vod/hls/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        types { video/MP2T ts; }
    }

    # 5. Ad Segments (Compatibility)
    location /segments/ads/ {
        alias /srv/vod/ads/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        types { video/MP2T ts; }
    }

    # 6. Admin Dashboard
    location /admin/ {
        proxy_pass http://127.0.0.1:8089/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        auth_basic "Admin Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # 7. Transcoder Dashboard & API
    location /transcoder/ {
        proxy_pass http://127.0.0.1:6666/;
        proxy_set_header Host $host;
        
        # Required for Server-Sent Events (SSE)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # 8. Management Tools
    location /sonarr/   { proxy_pass http://127.0.0.1:8989; }
    location /radarr/   { proxy_pass http://127.0.0.1:7878; }
    location /prowlarr/ { proxy_pass http://127.0.0.1:9696; }
}
