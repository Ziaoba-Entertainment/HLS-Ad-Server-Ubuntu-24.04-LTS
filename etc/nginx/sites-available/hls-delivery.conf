server {
    listen 8081;
    server_name _;

    # HLS Manifests - Proxy to Ad Stitching Middleware
    location /stream/ {
        proxy_pass http://127.0.0.1:8082/playlist/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;

        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Cache Control for Manifests
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;

        types {
            application/vnd.apple.mpegurl m3u8;
        }
    }

    # HLS Content Segments (.ts)
    location /segments/hls/ {
        alias /srv/vod/hls/;
        
        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        
        # Cache Control for Segments (1 year)
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        gzip off;
        tcp_nodelay on;
        
        types {
            video/mp2t ts;
        }
    }

    # Ad Segments (.ts)
    location /segments/ads/ {
        alias /srv/vod/ads/;
        
        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        
        # Cache Control for Segments (1 year)
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        gzip off;
        tcp_nodelay on;

        types {
            video/mp2t ts;
        }
    }

    # General Settings
    client_max_body_size 0;
    chunked_transfer_encoding on;
}
